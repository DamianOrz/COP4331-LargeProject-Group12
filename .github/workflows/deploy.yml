name: Deploy MERN Application

on:
  push:
    branches: [ main ]
  workflow_dispatch: # Allows manual trigger from Actions tab

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      # Checkout the repository code
      - name: Checkout code
        uses: actions/checkout@v4

      # Setup Node.js
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22.x'
          cache: 'npm' # Cache frontend dependencies
          cache-dependency-path: frontend/package-lock.json

      # Install and build frontend
      - name: Install frontend dependencies
        working-directory: ./frontend
        run: npm ci
      - name: Build frontend
        working-directory: ./frontend
        run: npm run build
        env:
          # Set the production API URL for the Vite build
          VITE_API_BASE_URL: /api

      # Deploy frontend to server
      - name: Deploy frontend to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          password: ${{ secrets.SERVER_PASSWORD }}
          port: ${{ secrets.SERVER_PORT }}
          source: "frontend/dist/*"
          target: "/var/www/html"
          strip_components: 2
          rm: true

      # Deploy backend files to server
      - name: Deploy backend files
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          password: ${{ secrets.SERVER_PASSWORD }}
          port: ${{ secrets.SERVER_PORT }}
          source: "backend/*"
          target: "/var/www/backend"
          strip_components: 1
          overwrite: true
          rm: true

      # Install backend dependencies and restart PM2
      - name: Install dependencies and restart server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          password: ${{ secrets.SERVER_PASSWORD }}
          port: ${{ secrets.SERVER_PORT }}
          script: |
            # Install server dependencies required for bun
            apt-get update
            apt-get install -y unzip
            # Install bun if not present
            if ! command -v bun &> /dev/null
            then
                echo "BUN NOT FOUND, INSTALLING..."
                curl -fsSL https://bun.sh/install | bash
            fi
            export BUN_INSTALL="$HOME/.bun"
            export PATH="$BUN_INSTALL/bin:$PATH"
            # Navigate to backend directory
            cd /var/www/backend
            # Create .env file from GitHub secrets using a heredoc for safety
            echo "MONGODB_URI=${{ secrets.MONGODB_URI }}" > .env
            echo "ACCESS_TOKEN_SECRET=${{ secrets.ACCESS_TOKEN_SECRET }}" >> .env
            echo "PORT=5000" >> .env
            # Install dependencies
            bun install --production
            # Ensure PM2 is installed globally
            npm list -g pm2 || npm install -g pm2
            # Restart the application with PM2 to apply changes
            pm2 restart bun-server --update-env || pm2 start index.ts --name "bun-server" --interpreter=$HOME/.bun/bin/bun
            # Save PM2 process list
            pm2 save